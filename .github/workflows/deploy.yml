name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Python: lint ETL + backend, run backend tests ----
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r etl/requirements.txt
          pip install flake8
      - name: Lint Python (flake8)
        run: flake8 backend etl
      - name: Backend tests (pytest)
        # Structural tests run without a DB; integration tests run when DATABASE_URL is set.
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: pytest backend/tests -q

      # ---- Node: lint + build the frontend ----
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy-backend:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # Skips cleanly until RAILWAY_TOKEN secret is added (keeps CI green pre-deploy).
      - name: Deploy FastAPI to Railway
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          npm i -g @railway/cli
          railway up --service backend --detach

  deploy-frontend:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      # Skips cleanly until VERCEL_TOKEN secret is added (keeps CI green pre-deploy).
      - name: Deploy Next.js to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        working-directory: frontend
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
